services:
  app:
    build: .
    image: rimowa-price-compare:local
    container_name: rimowa-price-compare
    ports:
      - "9753:9753"
    environment:
      # FX rate cache TTL (default 24h).
      CACHE_TTL_SECONDS: "86400"
      CACHE_DB_PATH: "/app/data/app.sqlite"
    volumes:
      # Tracked items + FX cache persist across container restarts.
      - ./data:/app/data
    restart: unless-stopped
