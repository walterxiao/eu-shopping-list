<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Tote body: clean rectangle (tote bags aren't flared like grocery bags) -->
  <rect x="10" y="24" width="44" height="36" rx="2" fill="#059669"/>
  <!-- Left handle: tall U-shape loop, the defining feature of a tote -->
  <path d="M16 24 V14 Q16 8 20 8 H24 Q28 8 28 14 V24" fill="none" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right handle: second parallel strap (totes have TWO handles) -->
  <path d="M36 24 V14 Q36 8 40 8 H44 Q48 8 48 14 V24" fill="none" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
</svg>
