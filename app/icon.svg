<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Bag body: trapezoid shape, wider at the bottom -->
  <path d="M12 22 L6 58 Q6 60 8 60 L56 60 Q58 60 58 58 L52 22 Z" fill="#059669" rx="3"/>
  <!-- Bag opening / fold line -->
  <line x1="12" y1="22" x2="52" y2="22" stroke="#047857" stroke-width="2"/>
  <!-- Handle: thin arc, darker color so it doesn't look like a lock -->
  <path d="M23 22 C23 10, 41 10, 41 22" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
  <!-- Small circle detail on the bag front -->
  <circle cx="32" cy="42" r="4" fill="#34d399"/>
</svg>
