name: Deploy to EC2

# Push to main → ship to the EC2 box. The workflow can also be run
# manually via the "Run workflow" button on the Actions tab if you
# need to redeploy without a code change (e.g. after a config tweak
# on the box itself).
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Don't run two deploys at the same time. If a second push lands
# while the first is still deploying, queue it — don't cancel the
# in-flight one (which would leave the box in a half-deployed state).
concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH + deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Echo target
        run: |
          echo "Deploying ${{ github.sha }} to ${{ secrets.EC2_HOST }}"
          echo "Project dir: ${{ secrets.EC2_PROJECT_DIR || '~/eu-shopping-list' }}"

      # appleboy/ssh-action is the most widely used SSH action and
      # handles known_hosts, key parsing, and command streaming
      # cleanly. Pinned to a specific version (not @v1) to avoid
      # supply-chain surprises if the maintainer ever publishes a
      # bad release.
      - name: Run deploy script over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Optional: a non-default SSH port. Leave empty for 22.
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          # Fail the workflow if any command in the block exits non-zero.
          script_stop: true
          # The remote script:
          #   1. Resolve the project dir. We default to
          #      $HOME/eu-shopping-list (NOT ~/eu-shopping-list —
          #      tilde isn't expanded inside double-quoted strings
          #      and the literal `~` would fail cd). If the user
          #      passed EC2_PROJECT_DIR as a secret, we additionally
          #      expand a leading `~` via bash parameter substitution
          #      so either form is accepted.
          #   2. Clone the repo with a short-lived github.token if
          #      the directory doesn't exist yet — this makes the
          #      very first deploy self-bootstrapping so the user
          #      doesn't have to SSH in and git-clone manually.
          #      `github.token` is injected per-run, works for both
          #      public and private repos, and expires when the
          #      workflow ends so the box never stores long-lived
          #      credentials.
          #   3. Fetch + hard-reset to the deployed commit.
          #   4. Run the in-repo deploy-on-ec2.sh which does the
          #      actual install/build/pm2-reload/healthcheck.
          script: |
            set -euo pipefail
            PROJECT_DIR="${{ secrets.EC2_PROJECT_DIR || '$HOME/eu-shopping-list' }}"
            # Expand a leading `~` if the user's secret started with one.
            PROJECT_DIR="${PROJECT_DIR/#\~/$HOME}"
            REPO_URL="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"

            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "==> cloning ${{ github.repository }} to $PROJECT_DIR (first deploy)"
              mkdir -p "$(dirname "$PROJECT_DIR")"
              git clone "$REPO_URL" "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"
            echo "==> fetching ${{ github.sha }}"
            git fetch "$REPO_URL" main
            git reset --hard ${{ github.sha }}
            chmod +x scripts/deploy-on-ec2.sh
            bash scripts/deploy-on-ec2.sh
